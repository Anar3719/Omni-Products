<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBFI · Product OS</title>
<style>
:root{--bg:#fff;--bg2:#f7f7f5;--bg3:#f0efe9;--text:#1a1a18;--text2:#5a5a56;--text3:#9a9a94;--border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);--green:#639922;--green-bg:#EAF3DE;--green-text:#3B6D11;--blue:#378ADD;--blue-bg:#E6F1FB;--blue-text:#185FA5;--red:#E24B4A;--red-bg:#FCEBEB;--red-text:#A32D2D;--amber:#BA7517;--amber-bg:#FAEEDA;--amber-text:#854F0B;--r:8px;--rl:12px}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;--text:#f0efe9;--text2:#a0a09a;--text3:#68685f;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);--green-bg:#1a2e0a;--green-text:#97C459;--blue-bg:#0a1e35;--blue-text:#85B7EB;--red-bg:#2e0a0a;--red-text:#F09595;--amber-bg:#2e1e0a;--amber-text:#EF9F27}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:8px;padding:9px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.brand{font-size:14px;font-weight:600;color:var(--text)}.brand span{font-weight:400;color:var(--text3)}
.spacer{flex:1}
.tbtn{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:5px 10px;border:1px solid var(--border2);border-radius:var(--r);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap}
.tbtn:hover,.tbtn.on{background:var(--bg);color:var(--text)}
.tbtn.prim{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600}
.tbtn.prim:hover{opacity:.9}
.team-bar{padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.tlbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;flex-shrink:0}
.mchip{display:inline-flex;align-items:center;gap:3px;font-size:12px;padding:3px 8px;border-radius:999px;border:1px solid var(--border);color:var(--text2);background:var(--bg)}
.mchip button{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;line-height:1;padding:0}
.mchip button:hover{color:var(--red)}
.minp{font-size:12px;border:1px solid var(--border2);border-radius:var(--r);padding:4px 8px;background:var(--bg);color:var(--text);outline:none;width:120px}
.layout{display:flex;flex:1;overflow:hidden}
.sb{width:185px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg2)}
.sb-head{padding:12px 13px 9px;border-bottom:1px solid var(--border)}
.sb-org{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.09em}
.sb-title{font-size:15px;font-weight:600;color:var(--text);margin-top:2px}
.sb-scroll{flex:1;overflow-y:auto;padding:4px 0 6px}
.sb-sec{font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:8px 12px 3px;display:flex;align-items:center;justify-content:space-between}
.sb-add{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;line-height:1;padding:0}
.sb-add:hover{color:var(--text)}
.pitem{display:flex;align-items:center;gap:6px;padding:6px 10px;cursor:pointer;border-radius:6px;margin:1px 5px;position:relative}
.pitem:hover{background:var(--bg)}.pitem.on{background:var(--bg);font-weight:600}
.pname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;color:var(--text2)}
.pitem.on .pname{color:var(--text)}
.pitem-act{display:none;gap:2px}
.pitem:hover .pitem-act{display:flex}
.piabtn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;padding:2px 3px;border-radius:4px;line-height:1}
.piabtn:hover{background:var(--bg3);color:var(--text)}.piabtn.del:hover{color:var(--red)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dl{background:var(--green)}.dp{background:var(--blue)}.db{background:var(--red)}.dpl{background:var(--amber)}
.pcnt{font-size:10px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);border-radius:999px;padding:0 5px;min-width:18px;text-align:center;flex-shrink:0}
.sb-foot{border-top:1px solid var(--border);padding:5px}
.gbtn{display:flex;align-items:center;gap:7px;padding:7px 10px;font-size:13px;color:var(--text2);cursor:pointer;border-radius:6px}
.gbtn:hover,.gbtn.on{background:var(--bg);color:var(--text);font-weight:600}
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.phdr{padding:13px 18px 0;border-bottom:1px solid var(--border);flex-shrink:0}
.ptrow{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.pt{font-size:18px;font-weight:700;color:var(--text)}
.plocal{font-size:13px;color:var(--text3);font-weight:400}
.bdg{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border-radius:999px;font-weight:600;cursor:pointer;position:relative}
.bl{background:var(--green-bg);color:var(--green-text)}.bp{background:var(--blue-bg);color:var(--blue-text)}.bb{background:var(--red-bg);color:var(--red-text)}.bpl{background:var(--amber-bg);color:var(--amber-text)}
.ptype{font-size:12px;color:var(--text3);margin-left:auto}
.smenu{position:absolute;top:calc(100% + 4px);left:0;background:var(--bg);border:1px solid var(--border2);border-radius:var(--r);padding:4px;z-index:100;min-width:130px;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.sopt{display:flex;align-items:center;gap:7px;padding:6px 9px;font-size:12px;cursor:pointer;border-radius:5px;color:var(--text2)}
.sopt:hover{background:var(--bg2)}
.pmeta-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:9px;padding:7px 10px;background:var(--bg2);border-radius:var(--r);border:1px solid var(--border)}
.pmeta-g{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.pmeta-l{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.pmeta-v{font-size:12px;color:var(--text);font-weight:500}
.pmeta-c{font-size:11px;padding:2px 7px;border-radius:999px;background:var(--bg);border:1px solid var(--border);color:var(--text2)}
.pmeta-sep{width:1px;height:14px;background:var(--border2);flex-shrink:0}
.tabs{display:flex}
.tab{padding:8px 13px;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;user-select:none}
.tab:hover{color:var(--text)}.tab.on{color:var(--text);font-weight:600;border-bottom-color:var(--text)}
.mbody{flex:1;overflow-y:auto;padding:15px 18px}
.tmeta{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;font-size:12px;color:var(--text3)}
.clr{background:none;border:none;font-size:11px;color:var(--text3);cursor:pointer;padding:0}
.clr:hover{color:var(--text2);text-decoration:underline}
.prog{height:3px;background:var(--bg3);border-radius:999px;margin-bottom:11px;overflow:hidden}
.pfill{height:100%;background:var(--green);border-radius:999px;transition:width .3s}
.ar{display:flex;gap:6px;margin-bottom:11px}
.ar input,.ar select{font-size:13px;border:1px solid var(--border2);border-radius:var(--r);padding:7px 9px;background:var(--bg2);color:var(--text);outline:none}
.ar input{flex:1}.ar select{max-width:125px}
.ar input:focus,.ar select:focus{border-color:var(--blue)}
.ar button{display:inline-flex;align-items:center;gap:4px;font-size:13px;padding:7px 11px;border:1px solid var(--border2);border-radius:var(--r);background:transparent;color:var(--text);cursor:pointer;flex-shrink:0}
.ar button:hover{background:var(--bg2)}
.tlist{display:flex;flex-direction:column;gap:4px}
.titem{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg2);border-radius:var(--r);border:1px solid transparent}
.titem:hover{border-color:var(--border)}
.chk{width:16px;height:16px;border-radius:4px;border:2px solid var(--border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.chk.ck{background:var(--green);border-color:var(--green)}
.chk.ck::after{content:'';width:8px;height:4px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px);display:block}
.ttxt{flex:1;font-size:13px;color:var(--text);line-height:1.4}
.ttxt.dn{color:var(--text3);text-decoration:line-through}
.atag{font-size:11px;color:var(--text2);background:var(--bg);border:1px solid var(--border);border-radius:999px;padding:2px 7px;white-space:nowrap}
.xbtn{background:none;border:none;font-size:15px;color:var(--text3);cursor:pointer;opacity:0;flex-shrink:0;line-height:1;padding:0}
.titem:hover .xbtn{opacity:1}.xbtn:hover{color:var(--red)}
.donesec{margin-top:11px;border-top:1px solid var(--border);padding-top:9px}
.dnhdr{font-size:12px;color:var(--text3);margin-bottom:6px}
.muted{font-size:13px;color:var(--text3);padding:6px 0}
.rcols{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.rcol{background:var(--bg2);border-radius:var(--rl);padding:11px}
.rch{display:flex;align-items:center;gap:5px;margin-bottom:9px}
.rct{font-size:13px;font-weight:600;color:var(--text)}
.rcc{font-size:11px;color:var(--text3);background:var(--bg);border-radius:999px;padding:1px 6px;border:1px solid var(--border)}
.rlist{min-height:28px;display:flex;flex-direction:column;gap:4px;margin-bottom:7px}
.rcard{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:6px 8px;font-size:12px;color:var(--text);display:flex;align-items:flex-start;gap:3px;line-height:1.5}
.rcard-t{flex:1;min-width:0;word-break:break-word}
.mvb,.rxb{background:none;border:none;font-size:13px;color:var(--text3);cursor:pointer;opacity:0;flex-shrink:0;line-height:1.5;padding:0}
.rcard:hover .mvb,.rcard:hover .rxb{opacity:.7}
.mvb:hover{opacity:1!important;color:var(--text)}.rxb:hover{opacity:1!important;color:var(--red)}
.radd{display:flex;gap:4px}
.radd input{flex:1;min-width:0;font-size:12px;border:1px solid var(--border2);border-radius:var(--r);padding:5px 7px;background:var(--bg);color:var(--text);outline:none}
.radd input:focus{border-color:var(--blue)}
.radd button{display:inline-flex;align-items:center;font-size:12px;padding:5px 7px;border:1px solid var(--border);border-radius:var(--r);background:transparent;color:var(--text2);cursor:pointer;flex-shrink:0}
.radd button:hover{background:var(--bg2)}
.stitle{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;margin-top:15px}
.stitle:first-child{margin-top:0}
.idesc{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:13px}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:13px}
.tag{font-size:11px;padding:3px 8px;border-radius:999px;border:1px solid var(--border2);color:var(--text2)}
.ps-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:4px}
.ps-col{background:var(--bg2);border-radius:var(--rl);padding:11px}
.ps-col-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.ps-items{display:flex;flex-direction:column;gap:3px;margin-bottom:7px}
.ps-item{display:flex;align-items:center;gap:6px;padding:5px 8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);font-size:12px;color:var(--text)}
.ps-item-name{flex:1}
.ps-xbtn{background:none;border:none;font-size:13px;color:var(--text3);cursor:pointer;opacity:0;line-height:1;padding:0}
.ps-item:hover .ps-xbtn{opacity:1}.ps-xbtn:hover{color:var(--red)}
.ps-add{display:flex;gap:4px}
.ps-add input{flex:1;font-size:12px;border:1px solid var(--border2);border-radius:var(--r);padding:5px 7px;background:var(--bg);color:var(--text);outline:none}
.ps-add input:focus{border-color:var(--blue)}
.ps-add button{display:inline-flex;align-items:center;font-size:12px;padding:5px 7px;border:1px solid var(--border);border-radius:var(--r);background:transparent;color:var(--text2);cursor:pointer}
.ps-add button:hover{background:var(--bg)}
.team-sec{background:var(--bg2);border-radius:var(--rl);padding:13px 15px;margin-bottom:5px}
.tf{display:flex;align-items:center;gap:11px;margin-bottom:9px}
.tf:last-child{margin-bottom:0}
.tfl{font-size:12px;color:var(--text3);width:75px;flex-shrink:0}
.tf select{font-size:13px;border:1px solid var(--border2);border-radius:var(--r);padding:5px 8px;background:var(--bg);color:var(--text);outline:none;cursor:pointer}
.dev-chips{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.dev-chip{display:inline-flex;align-items:center;gap:3px;font-size:12px;padding:3px 9px;border-radius:999px;border:1px solid var(--border);color:var(--text2);background:var(--bg)}
.dev-chip button{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;line-height:1;padding:0}
.dev-chip button:hover{color:var(--red)}
.dev-add-sel{font-size:12px;border:1px solid var(--border2);border-radius:var(--r);padding:4px 8px;background:var(--bg);color:var(--text2);outline:none;cursor:pointer}
.conn-row{display:flex;align-items:center;gap:6px;font-size:12px;padding:6px 9px;background:var(--bg2);border-radius:var(--r);margin-bottom:3px;flex-wrap:wrap}
.cproj{font-weight:600;color:var(--text)}.citem{color:var(--text2)}
.crel{font-size:10px;padding:2px 5px;border-radius:4px;border:1px solid var(--border);color:var(--text3);background:var(--bg)}
.carr{color:var(--text3);font-size:11px}
.csa{font-size:10px;padding:1px 6px;border-radius:999px;background:var(--green-bg);color:var(--green-text);font-weight:600}
.csp{font-size:10px;padding:1px 6px;border-radius:999px;background:var(--amber-bg);color:var(--amber-text);font-weight:600}
.cdel{background:none;border:none;font-size:12px;color:var(--text3);cursor:pointer;opacity:0;padding:0;margin-left:auto}
.conn-row:hover .cdel{opacity:1}.cdel:hover{color:var(--red)}
.ghdr{padding:14px 18px 13px;border-bottom:1px solid var(--border);flex-shrink:0}
.gtitle{font-size:18px;font-weight:700;color:var(--text);margin-bottom:2px}
.gsub{font-size:13px;color:var(--text2)}
.filter-bar{display:flex;gap:5px;padding:9px 18px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.fbtn{font-size:12px;padding:4px 10px;border:1px solid var(--border);border-radius:999px;background:transparent;color:var(--text2);cursor:pointer}
.fbtn:hover{background:var(--bg2)}.fbtn.on{background:var(--bg2);border-color:var(--border2);color:var(--text);font-weight:600}
.scrollbody{flex:1;overflow-y:auto;padding:15px 18px}
.lsec{margin-bottom:17px}
.lhdr{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.llbl{font-size:14px;font-weight:600;color:var(--text)}
.lcnt{font-size:11px;color:var(--text3);background:var(--bg2);border-radius:999px;padding:1px 6px;border:1px solid var(--border)}
.lgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:7px}
.lcard{background:var(--bg2);border-radius:var(--r);padding:8px 10px;cursor:pointer}
.lcard:hover{background:var(--bg3)}
.lcard-n{font-size:11px;font-weight:600;color:var(--text);margin-bottom:5px;display:flex;align-items:center;justify-content:space-between;text-transform:uppercase;letter-spacing:.05em}
.lcard-cnt{font-size:10px;color:var(--text3);font-weight:400;text-transform:none;letter-spacing:0}
.litem{font-size:12px;color:var(--text2);padding:2px 0;display:flex;align-items:flex-start;gap:4px;line-height:1.4}
.litem::before{content:"\00B7";color:var(--text3);flex-shrink:0}
.add-conn-form{background:var(--bg2);border-radius:var(--rl);padding:13px 15px;margin-top:3px}
.acr{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:9px}
.acr select,.acr input{font-size:12px;border:1px solid var(--border2);border-radius:var(--r);padding:5px 8px;background:var(--bg);color:var(--text);outline:none;cursor:pointer}
.stog{display:flex;border:1px solid var(--border2);border-radius:var(--r);overflow:hidden}
.stog button{font-size:11px;padding:5px 9px;border:none;background:transparent;color:var(--text2);cursor:pointer}
.stog button.on{background:var(--blue);color:#fff}
.acr button.primary{font-size:12px;padding:5px 11px;border:1px solid var(--blue);border-radius:var(--r);background:var(--blue);color:#fff;cursor:pointer;font-weight:600}
.ov-body{flex:1;overflow-y:auto;padding:18px}
.ov-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:3px}
.ov-sub{font-size:13px;color:var(--text2);margin-bottom:18px}
.ov-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:20px}
.sc{background:var(--bg2);border-radius:var(--rl);padding:13px 15px;border:1px solid var(--border)}
.sv{font-size:26px;font-weight:700;color:var(--text);margin-bottom:2px}
.sl{font-size:12px;color:var(--text2)}
.sc.green .sv{color:var(--green)}.sc.blue .sv{color:var(--blue)}.sc.red .sv{color:var(--red)}.sc.amber .sv{color:var(--amber)}
.ov-sec{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:9px}
.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(205px,1fr));gap:9px;margin-bottom:20px}
.opc{background:var(--bg2);border-radius:var(--rl);padding:11px 13px;cursor:pointer;border:1px solid var(--border)}
.opc:hover{border-color:var(--border2)}
.opc-top{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.opc-name{font-size:13px;font-weight:600;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.opc-type{font-size:11px;color:var(--text3);margin-bottom:7px}
.opc-row{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:4px}
.opc-prog{height:3px;background:var(--bg3);border-radius:999px;margin-top:7px;overflow:hidden}
.opc-pfill{height:100%;background:var(--green);border-radius:999px}
.opc-meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.opc-chip{font-size:10px;padding:2px 6px;border-radius:999px;border:1px solid var(--border);color:var(--text3)}
.opc-chip.warn{color:var(--amber-text);border-color:var(--amber)}
.eco-wrap{flex:1;overflow:hidden;position:relative;background:var(--bg2)}
.eco-legend{position:absolute;bottom:13px;left:13px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;font-size:11px;z-index:10}
.eco-legend-title{font-weight:600;color:var(--text);margin-bottom:6px}
.eco-lr{display:flex;align-items:center;gap:5px;color:var(--text2);margin-bottom:3px}
.eco-lr:last-child{margin-bottom:0}
.eco-hint{position:absolute;top:13px;right:13px;font-size:11px;color:var(--text3);background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:6px 10px;z-index:10}
.eco-tooltip{position:absolute;pointer-events:none;background:var(--bg);border:1px solid var(--border2);border-radius:var(--r);padding:10px 12px;font-size:12px;z-index:20;max-width:220px;box-shadow:0 4px 16px rgba(0,0,0,.12);display:none}
.eco-tt-name{font-weight:700;color:var(--text);font-size:13px;margin-bottom:3px}
.eco-tt-type{color:var(--text3);font-size:11px;margin-bottom:6px}
.eco-tt-row{display:flex;gap:7px;font-size:11px;color:var(--text2);margin-bottom:2px}
.eco-tt-key{color:var(--text3);min-width:70px}
.modal-overlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(2px)}
.modal-box{position:relative;background:var(--bg);border-radius:var(--rl);border:1px solid var(--border2);width:100%;max-width:500px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.modal-box.sm{max-width:380px}
.modal-hdr{padding:18px 20px 14px;border-bottom:1px solid var(--border)}
.modal-title{font-size:16px;font-weight:700;color:var(--text)}
.modal-sub{font-size:13px;color:var(--text2);margin-top:2px}
.modal-body{flex:1;overflow-y:auto;padding:16px 20px}

.mfld label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.mfld input,.mfld textarea,.mfld select{width:100%;font-size:13px;border:1px solid var(--border2);border-radius:var(--r);padding:8px 10px;background:var(--bg2);color:var(--text);outline:none;font-family:inherit}
.mfld textarea{resize:vertical;min-height:70px;line-height:1.5}
.mfld input:focus,.mfld textarea:focus,.mfld select:focus{border-color:var(--blue)}
.tag-inp-wrap{display:flex;flex-direction:column;gap:6px}
.tag-chips{display:flex;flex-wrap:wrap;gap:5px}
.tag-chip{display:inline-flex;align-items:center;gap:3px;font-size:12px;padding:3px 8px;border-radius:999px;background:var(--bg2);border:1px solid var(--border);color:var(--text2)}
.tag-chip button{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;line-height:1;padding:0}

.mbtn{font-size:13px;padding:7px 14px;border-radius:var(--r);cursor:pointer;font-weight:500;border:1px solid var(--border2);background:transparent;color:var(--text2)}

function $(id){return document.getElementById(id);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5);}
function toArr(v){if(!v)return[];if(Array.isArray(v))return v;if(typeof v==='object')return Object.values(v);return[];}

/* ── CONSTANTS ── */

function pTasks(pid){return Object.values(D.tasks||{}).filter(t=>t.p===pid);}
function openTasks(pid){return pTasks(pid).filter(t=>!t.done).length;}
function roadItems(pid){return Object.values(D.road||{}).filter(r=>r.p===pid);}
function getMeta(pid){return(D.pmeta||{})[pid]||{leader:'',devs:[],items:[]};}
function getItems(pid){return getMeta(pid).items||[];}
function pName(pid){const p=(D.projects||{})[pid];return p?p.name:pid;}
function sdot(s){const m=SM[s]||SM.progress;return '<span class="dot '+m.d+'" style="width:6px;height:6px"></span>';}
function badge(s,click){const m=SM[s]||SM.progress;return '<span class="bdg '+m.b+'"'+(click?' onclick="toggleSmenu(event)" title="Click to change"':'')+'>'+sdot(s)+m.l+'</span>';}
function connRow(c,del){
  const arr=c.st==='active'?'\u2192':'\u2194';

    '<span class="carr">'+arr+'</span><span class="crel">'+esc(c.rel)+'</span><span class="carr">'+arr+'</span>'+
    '<span class="cproj">'+esc(pName(c.tp))+'</span>'+(c.ti?'<span class="citem">/ '+esc(c.ti)+'</span>':'')+sb+db+'</div>';}

/* ── SAVE/LOAD ── */
function save(){
  try{localStorage.setItem('nbfi_v4',JSON.stringify(D));}
  catch(e){console.error('Save error',e);}
}
function exportData(){
  const blob=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='nbfi_'+new Date().toISOString().slice(0,10)+'.json';a.click();
}

/* ── NORMALISE ── */
function normalise(d){
  const projects={};
  Object.entries(d.projects||{}).forEach(([k,p])=>{projects[k]={...p,tags:toArr(p.tags)};});
  const pmeta={};
  Object.entries(d.pmeta||{}).forEach(([k,m])=>{pmeta[k]={leader:m.leader||'',devs:toArr(m.devs),items:toArr(m.items).map(i=>({...i}))};});
  const tasks={},road={},conns={},ecoPos={};
  Object.entries(d.tasks||{}).forEach(([k,t])=>{tasks[k]={...t};});
  Object.entries(d.road||{}).forEach(([k,r])=>{road[k]={...r};});
  Object.entries(d.conns||{}).forEach(([k,c])=>{conns[k]={...c};});
  Object.entries(d.ecoPos||DEF_ECO).forEach(([k,p])=>{ecoPos[k]={...p};});
  return{projects,tasks,road,team:toArr(d.team||[]),pmeta,conns,ecoPos};
}

/* ── RENDER ── */
function render(){renderSB();renderTeam();renderMain();}

function renderSB(){
  const s=$('sb-scroll'),f=$('sb-foot');if(!s||!f)return;

    projs().map(p=>{
      const m=SM[p.status]||SM.progress,on=!ui.gview&&ui.sel===p.id,cnt=openTasks(p.id);
      return'<div class="pitem'+(on?' on':'')+'" onclick="selProj(\''+p.id+'\')">'+
        '<span class="dot '+m.d+'"></span><span class="pname">'+esc(p.name)+'</span>'+
        (cnt?'<span class="pcnt">'+cnt+'</span>':'')+

        '<button class="piabtn" onclick="event.stopPropagation();openModal(\'edit-project\',{id:\''+p.id+'\'})" title="Edit">&#9998;</button>'+

        '</span></div>';
    }).join('');
  f.innerHTML=
    '<div class="gbtn'+(ui.gview==='overview'?' on':'')+'" onclick="setGview(\'overview\')">&#8962; Overview</div>'+

function renderMain(){
  const main=$('main');if(!main)return;
  if(ui.gview==='overview'){main.innerHTML=buildOverview();return;}
  if(ui.gview==='road'){main.innerHTML=buildGRoad();return;}
  if(ui.gview==='ints'){main.innerHTML=buildGInts();return;}

/* ── OVERVIEW ── */
function buildOverview(){
  const ps=projs();
  const live=ps.filter(p=>p.status==='live').length,prog=ps.filter(p=>p.status==='progress').length;
  const bugs=ps.filter(p=>p.status==='bugs').length,totalOpen=Object.values(D.tasks||{}).filter(t=>!t.done).length;
  const cards=ps.map(p=>{
    const at=pTasks(p.id),ot=at.filter(t=>!t.done).length,dt=at.length-ot;
    const pct=at.length>0?Math.round(dt/at.length*100):0;
    const meta=getMeta(p.id),items=meta.items||[];
    const pc=Object.values(D.conns||{}).filter(c=>c.fp===p.id||c.tp===p.id).length;
    return'<div class="opc" onclick="selProj(\''+p.id+'\')">'+
      '<div class="opc-top"><span class="opc-name">'+esc(p.name)+'</span>'+badge(p.status,false)+'</div>'+
      '<div class="opc-type">'+esc(p.type)+'</div>'+
      '<div class="opc-row"><span>'+ot+' open tasks</span><span>'+pc+' connections</span></div>'+
      (at.length?'<div class="opc-prog"><div class="opc-pfill" style="width:'+pct+'%"></div></div>':'')+
      '<div class="opc-meta">'+
      (meta.leader?'<span class="opc-chip">&#128100; '+esc(meta.leader)+'</span>':'<span class="opc-chip warn">No lead</span>')+
      (items.filter(i=>i.kind==='feature').length?'<span class="opc-chip">'+items.filter(i=>i.kind==='feature').length+'f</span>':'')+
      (items.filter(i=>i.kind==='service').length?'<span class="opc-chip">'+items.filter(i=>i.kind==='service').length+'s</span>':'')+
      '</div></div>';
  }).join('');
  const nowItems=Object.values(D.road||{}).filter(r=>r.lane==='now');
  const byP={};nowItems.forEach(i=>{if(!byP[i.p])byP[i.p]=[];byP[i.p].push(i);});
  const nowHtml=Object.entries(byP).map(([pid,its])=>{
    const proj=(D.projects||{})[pid];if(!proj)return'';
    return'<div class="lcard" onclick="selProj(\''+pid+'\')"><div class="lcard-n"><span>'+esc(proj.name)+'</span><span class="lcard-cnt">'+its.length+'</span></div>'+its.map(i=>'<div class="litem">'+esc(i.txt)+'</div>').join('')+'</div>';
  }).join('');
  const ac=Object.values(D.conns||{}).filter(c=>c.st==='active').length;
  const pc=Object.values(D.conns||{}).filter(c=>c.st==='planned').length;
  return'<div class="ov-body">'+
    '<div class="ov-title">Product Portfolio</div>'+
    '<div class="ov-sub">Full picture of where we stand and where we\'re moving</div>'+
    '<div class="ov-stats">'+
    '<div class="sc green"><div class="sv">'+live+'</div><div class="sl">Live &amp; stable</div></div>'+
    '<div class="sc blue"><div class="sv">'+prog+'</div><div class="sl">In active dev</div></div>'+
    '<div class="sc red"><div class="sv">'+bugs+'</div><div class="sl">Has bugs</div></div>'+
    '<div class="sc"><div class="sv">'+totalOpen+'</div><div class="sl">Open tasks</div></div>'+
    '</div><div class="ov-sec">All projects</div><div class="ov-grid">'+cards+'</div>'+

/* ── TASKS ── */
function buildTasks(){
  const all=pTasks(ui.sel),open=all.filter(t=>!t.done),done=all.filter(t=>t.done);
  const total=all.length,doneN=done.length,pct=total?Math.round(doneN/total*100):0;
  const opts=(D.team||[]).map(m=>'<option value="'+esc(m)+'">'+esc(m)+'</option>').join('');
  const prog=total?'<div class="tmeta"><span>'+doneN+'/'+total+' done</span>'+(doneN?'<button class="clr" onclick="clearDone()">Clear done</button>':'')+'</div><div class="prog"><div class="pfill" style="width:'+pct+'%"></div></div>':'';
  const ti=t=>'<div class="titem"><div class="chk'+(t.done?' ck':'')+'" onclick="toggleTask(\''+t.id+'\')"></div>'+
    '<span class="ttxt'+(t.done?' dn':'')+'">'+esc(t.txt)+'</span>'+(t.a?'<span class="atag">'+esc(t.a)+'</span>':'')+
    '<button class="xbtn" onclick="delTask(\''+t.id+'\')">&#10005;</button></div>';
  const ds=done.length?'<div class="donesec"><div class="dnhdr">Done ('+done.length+')</div><div class="tlist">'+done.map(ti).join('')+'</div></div>':'';
  return'<div class="ar"><input id="ti" type="text" placeholder="Add a task..." onkeydown="if(event.key===\'Enter\')addTask()">'+
    '<select id="ta"><option value="">Unassigned</option>'+opts+'</select>'+
    '<button onclick="addTask()">+ Add</button></div>'+
    prog+'<div class="tlist">'+(open.length?open.map(ti).join(''):'<div class="muted">No open tasks \u2014 add one above.</div>')+'</div>'+ds;
}

/* ── ECOSYSTEM ── */
function buildEco(){
  const stC={live:'#639922',progress:'#378ADD',bugs:'#E24B4A',planned:'#BA7517'};
  let edges='',nodes='';
  const seen=new Set();
  Object.values(D.conns||{}).forEach(c=>{
    if(c.fp===c.tp)return;
    const key=[c.fp,c.tp].sort().join('|');if(seen.has(key))return;seen.add(key);
    const fp=(D.ecoPos||{})[c.fp]||{x:440,y:240},tp=(D.ecoPos||{})[c.tp]||{x:440,y:240};
    const col=c.st==='active'?'#378ADD':'#BA7517',dash=c.st==='active'?'':'6,4';
    const mx=(fp.x+tp.x)/2,my=(fp.y+tp.y)/2-5;
    edges+='<line x1="'+fp.x+'" y1="'+fp.y+'" x2="'+tp.x+'" y2="'+tp.y+'" stroke="'+col+'" stroke-width="1.5" stroke-dasharray="'+dash+'" opacity="0.55"/>';
    edges+='<text x="'+mx+'" y="'+my+'" text-anchor="middle" font-size="9" fill="'+col+'" opacity="0.75">'+esc(c.rel)+'</text>';
  });
  projs().forEach(p=>{
    const pos=(D.ecoPos||{})[p.id]||{x:440,y:240};
    const col=stC[p.status]||'#378ADD';
    const meta=getMeta(p.id),items=meta.items||[];
    const feats=items.filter(i=>i.kind==='feature').length,svcs=items.filter(i=>i.kind==='service').length;
    const ot=openTasks(p.id),r=p.id==='moni'?40:30;
    if(p.status==='bugs')nodes+='<circle cx="'+pos.x+'" cy="'+pos.y+'" r="'+(r+6)+'" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.4"/>';
    nodes+='<circle cx="'+pos.x+'" cy="'+pos.y+'" r="'+r+'" fill="'+col+'" opacity="0.13" stroke="'+col+'" stroke-width="2" style="cursor:pointer" class="eco-node" data-id="'+p.id+'" onclick="selProj(\''+p.id+'\')"/>';
    nodes+='<text x="'+pos.x+'" y="'+(pos.y+4)+'" text-anchor="middle" dominant-baseline="middle" font-size="'+(p.id==='moni'?13:11)+'" font-weight="600" fill="'+col+'" style="pointer-events:none">'+esc(p.name)+'</text>';
    if(ot>0){nodes+='<circle cx="'+(pos.x+r-3)+'" cy="'+(pos.y-r+3)+'" r="8" fill="#E24B4A"/><text x="'+(pos.x+r-3)+'" y="'+(pos.y-r+3)+'" text-anchor="middle" dominant-baseline="middle" font-size="8" fill="white" font-weight="700" style="pointer-events:none">'+ot+'</text>';}
    const ct=(feats?feats+'f':'')+(feats&&svcs?' ':'')+( svcs?svcs+'s':'');
    if(ct)nodes+='<text x="'+pos.x+'" y="'+(pos.y+r+12)+'" text-anchor="middle" font-size="9" fill="'+col+'" opacity="0.65" style="pointer-events:none">'+ct+'</text>';
  });
  return'<div class="ghdr"><div class="gtitle">Ecosystem</div><div class="gsub">Visual map of all projects and connections</div></div>'+
    '<div class="eco-wrap" id="eco-wrap">'+
    '<svg viewBox="0 0 900 500" style="width:100%;height:100%" xmlns="http://www.w3.org/2000/svg">'+edges+nodes+'</svg>'+
    '<div class="eco-legend"><div class="eco-legend-title">Legend</div>'+
    '<div class="eco-lr"><svg width="16" height="8"><circle cx="8" cy="4" r="4" fill="#639922" opacity="0.25" stroke="#639922" stroke-width="1.5"/></svg>Live</div>'+
    '<div class="eco-lr"><svg width="16" height="8"><circle cx="8" cy="4" r="4" fill="#378ADD" opacity="0.25" stroke="#378ADD" stroke-width="1.5"/></svg>In progress</div>'+
    '<div class="eco-lr"><svg width="16" height="8"><circle cx="8" cy="4" r="4" fill="#E24B4A" opacity="0.25" stroke="#E24B4A" stroke-width="1.5"/></svg>Has bugs</div>'+
    '<div class="eco-lr"><svg width="24" height="8"><line x1="0" y1="4" x2="24" y2="4" stroke="#378ADD" stroke-width="1.5"/></svg>Active</div>'+
    '<div class="eco-lr"><svg width="24" height="8"><line x1="0" y1="4" x2="24" y2="4" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="4,3"/></svg>Planned</div>'+
    '</div><div class="eco-hint">Click any node to open project</div></div>';
}

function attachEcoEvents(){
  const tt=$('eco-tt');
  document.querySelectorAll('.eco-node').forEach(node=>{
    node.addEventListener('mouseenter',function(e){
      const p=(D.projects||{})[this.dataset.id];if(!p)return;
      const meta=getMeta(p.id),items=meta.items||[];
      tt.innerHTML='<div class="eco-tt-name">'+esc(p.name)+'</div><div class="eco-tt-type">'+esc(p.type)+'</div>'+
        (meta.leader?'<div class="eco-tt-row"><span class="eco-tt-key">Lead</span><span>'+esc(meta.leader)+'</span></div>':'')+
        '<div class="eco-tt-row"><span class="eco-tt-key">Status</span><span>'+(SM[p.status]||SM.progress).l+'</span></div>'+
        '<div class="eco-tt-row"><span class="eco-tt-key">Open tasks</span><span>'+openTasks(p.id)+'</span></div>'+
        '<div class="eco-tt-row"><span class="eco-tt-key">Connections</span><span>'+Object.values(D.conns||{}).filter(c=>c.fp===p.id||c.tp===p.id).length+'</span></div>'+
        '<div class="eco-tt-row"><span class="eco-tt-key">Features</span><span>'+items.filter(i=>i.kind==='feature').length+'</span></div>';
      tt.style.display='block';
    });
    node.addEventListener('mousemove',function(e){
      const wrap=$('eco-wrap');if(!wrap)return;
      const rect=wrap.getBoundingClientRect();
      let l=e.clientX-rect.left+14,t=e.clientY-rect.top+14;
      if(l+230>rect.width)l=e.clientX-rect.left-234;
      tt.style.left=l+'px';tt.style.top=t+'px';
    });
    node.addEventListener('mouseleave',()=>tt.style.display='none');
  });
}

/* ── MODALS ── */
function openModal(type,data){
  ui.modal={type,data};
  if(type==='add-project')mFormState={name:'',local:'',type:'',status:'progress',desc:'',tags:[]};
  if(type==='edit-project'&&data.id){const p=(D.projects||{})[data.id]||{};mFormState={name:p.name||'',local:p.local||'',type:p.type||'',status:p.status||'progress',desc:p.desc||'',tags:[...(p.tags||[])]};};
  renderModal();
}
function closeModal(){ui.modal=null;renderModal();}
function renderModal(){
  const ov=$('modal-overlay'),box=$('modal-box'),bg=$('modal-bg');
  if(!ui.modal){ov.style.display='none';return;}
  ov.style.display='flex';bg.onclick=closeModal;box.className='modal-box';
  const{type,data}=ui.modal;
  if(type==='add-project'||type==='edit-project'){
    const isEdit=type==='edit-project';
    const tagChips=mFormState.tags.map((t,i)=>'<span class="tag-chip">'+esc(t)+'<button onclick="removeModalTag('+i+')">&#10005;</button></span>').join('');
    box.innerHTML='<div class="modal-hdr"><div class="modal-title">'+(isEdit?'Edit project':'Add project')+'</div></div>'+
      '<div class="modal-body">'+
      '<div class="mfld"><label>Name *</label><input id="mf-name" type="text" value="'+esc(mFormState.name)+'" placeholder="e.g. Moni" oninput="mFormState.name=this.value"></div>'+
      '<div class="mfld"><label>Mongolian name</label><input id="mf-local" type="text" value="'+esc(mFormState.local)+'" oninput="mFormState.local=this.value"></div>'+
      '<div class="mfld"><label>Type</label><input id="mf-type" type="text" value="'+esc(mFormState.type)+'" placeholder="e.g. Fintech super-app" oninput="mFormState.type=this.value"></div>'+
      '<div class="mfld"><label>Status</label><select id="mf-status" onchange="mFormState.status=this.value">'+Object.entries(SM).map(([k,v])=>'<option value="'+k+'"'+(mFormState.status===k?' selected':'')+'>'+v.l+'</option>').join('')+'</select></div>'+
      '<div class="mfld"><label>Description</label><textarea oninput="mFormState.desc=this.value">'+esc(mFormState.desc)+'</textarea></div>'+
      '<div class="mfld"><label>Tags</label><div class="tag-inp-wrap"><div class="tag-chips" id="modal-tag-chips">'+tagChips+'</div>'+
      '<input type="text" id="mf-tag-inp" placeholder="Type tag + Enter" onkeydown="if(event.key===\'Enter\'){addModalTag();event.preventDefault()}"></div></div>'+
      '</div><div class="modal-foot">'+
      '<button class="mbtn" onclick="closeModal()">Cancel</button>'+
      '<button class="mbtn prim" onclick="saveProject(\''+(isEdit?data.id:'')+'\')">&#10003; '+(isEdit?'Save':'Create')+'</button></div>';
  }else if(type==='del-project'){
    box.className='modal-box sm';
    const p=(D.projects||{})[data.id];
    const tc=Object.values(D.tasks||{}).filter(t=>t.p===data.id).length;
    const rc=Object.values(D.road||{}).filter(r=>r.p===data.id).length;
    box.innerHTML='<div class="modal-hdr"><div class="modal-title">Delete project</div></div>'+
      '<div class="modal-body"><p class="del-warn">Delete <strong>'+esc(p?p.name:data.id)+'</strong>? This also removes '+tc+' task'+(tc!==1?'s':'')+' and '+rc+' roadmap item'+(rc!==1?'s':'')+'.</p></div>'+
      '<div class="modal-foot"><button class="mbtn" onclick="closeModal()">Cancel</button>'+
      '<button class="mbtn danger" onclick="deleteProject(\''+data.id+'\')">Delete</button></div>';
  }
}
function addModalTag(){const inp=$('mf-tag-inp'),val=(inp?inp.value:'').trim();if(!val||mFormState.tags.includes(val))return;mFormState.tags.push(val);if(inp)inp.value='';const el=$('modal-tag-chips');if(el)el.innerHTML=mFormState.tags.map((t,i)=>'<span class="tag-chip">'+esc(t)+'<button onclick="removeModalTag('+i+')">&#10005;</button></span>').join('');}
function removeModalTag(i){mFormState.tags.splice(i,1);renderModal();}
function saveProject(editId){
  if(!mFormState.name.trim()){alert('Name required.');return;}
  const id=editId||'p'+uid();
  const proj={id,name:mFormState.name.trim(),local:mFormState.local.trim(),type:mFormState.type.trim(),status:mFormState.status,desc:mFormState.desc.trim(),tags:[...mFormState.tags]};
  if(!D.projects)D.projects={};
  D.projects[id]=proj;
  if(!editId){
    if(!D.pmeta)D.pmeta={};D.pmeta[id]={leader:'',devs:[],items:[]};
    if(!D.ecoPos)D.ecoPos={};
    D.ecoPos[id]={x:Math.round(200+Math.random()*500),y:Math.round(100+Math.random()*300)};
    ui.sel=id;ui.gview=null;ui.tab='tasks';
  }
  closeModal();save();render();
}
function deleteProject(id){
  delete D.projects[id];if(D.pmeta)delete D.pmeta[id];if(D.ecoPos)delete D.ecoPos[id];
  Object.keys(D.tasks||{}).forEach(k=>{if((D.tasks[k]||{}).p===id)delete D.tasks[k];});
  Object.keys(D.road||{}).forEach(k=>{if((D.road[k]||{}).p===id)delete D.road[k];});
  Object.keys(D.conns||{}).forEach(k=>{const c=D.conns[k]||{};if(c.fp===id||c.tp===id)delete D.conns[k];});
  if(ui.sel===id){const ids=Object.keys(D.projects||{});ui.sel=ids[0]||null;ui.gview='overview';}
  closeModal();save();render();
}

function setTab(t){ui.tab=t;ui.statusMenu=false;render();}
function setGview(v){ui.gview=v;ui.statusMenu=false;render();}
function toggleTeam(){ui.showTeam=!ui.showTeam;render();}
function setRoadFilter(f){ui.roadFilter=f;renderMain();}
function toggleSmenu(e){e.stopPropagation();ui.statusMenu=!ui.statusMenu;renderMain();}
function setStatus(s){const p=(D.projects||{})[ui.sel];if(!p)return;p.status=s;ui.statusMenu=false;save();render();}
document.addEventListener('click',e=>{if(ui.statusMenu&&!e.target.closest('.bdg')&&!e.target.closest('.smenu')){ui.statusMenu=false;renderMain();}});

function addTask(){const ti=$('ti'),ta=$('ta');const txt=(ti?ti.value:'').trim();if(!txt)return;const id='t'+uid();if(!D.tasks)D.tasks={};D.tasks[id]={id,p:ui.sel,txt,a:ta?ta.value:'',done:false};if(ti)ti.value='';save();render();}
function toggleTask(id){const t=(D.tasks||{})[id];if(!t)return;t.done=!t.done;save();render();}
function delTask(id){delete D.tasks[id];save();render();}
function clearDone(){Object.keys(D.tasks||{}).forEach(k=>{if((D.tasks[k]||{}).p===ui.sel&&D.tasks[k].done)delete D.tasks[k];});save();render();}
function addRoad(lane){const el=$('ri_'+lane),txt=(el?el.value:'').trim();if(!txt)return;const id='r'+uid();if(!D.road)D.road={};D.road[id]={id,p:ui.sel,txt,lane};if(el)el.value='';save();render();}
function delRoad(id){delete D.road[id];save();render();}
function moveRoad(id,dir){const r=(D.road||{})[id];if(!r)return;const ni=LANES.indexOf(r.lane)+dir;if(ni<0||ni>2)return;r.lane=LANES[ni];save();render();}
function addMem(){const el=$('mi'),name=(el?el.value:'').trim();if(!name)return;if(!D.team)D.team=[];if(!D.team.includes(name))D.team.push(name);if(el)el.value='';save();render();}
function delMem(i){if(!D.team)return;D.team.splice(i,1);save();render();}
function setLeader(val){if(!D.pmeta)D.pmeta={};const m=getMeta(ui.sel);D.pmeta[ui.sel]={...m,leader:val};save();render();}
function addDev(name){if(!name)return;if(!D.pmeta)D.pmeta={};const m=getMeta(ui.sel);if(!(m.devs||[]).includes(name)){D.pmeta[ui.sel]={...m,devs:[...(m.devs||[]),name]};save();render();}}
function removeDev(i){if(!D.pmeta)return;const m=getMeta(ui.sel);const d=[...(m.devs||[])];d.splice(i,1);D.pmeta[ui.sel]={...m,devs:d};save();render();}
function addItem(kind){const inp=$(kind==='feature'?'fi_inp':'si_inp');const name=(inp?inp.value:'').trim();if(!name)return;if(!D.pmeta)D.pmeta={};const m=getMeta(ui.sel);D.pmeta[ui.sel]={...m,items:[...(m.items||[]),{id:'i'+uid(),name,kind}]};if(inp)inp.value='';save();render();}
function removeItem(iid){if(!D.pmeta)return;const m=getMeta(ui.sel);D.pmeta[ui.sel]={...m,items:(m.items||[]).filter(i=>i.id!==iid)};save();render();}
function ncSet(key,val){ui.nc[key]=val;if(key==='fp')ui.nc.fi='';if(key==='tp')ui.nc.ti='';renderMain();}
function ncSetSt(val){ui.nc.st=val;renderMain();}
function addConn(){if(!ui.nc.fp||!ui.nc.tp){alert('Select both projects.');return;}const rel=(($('conn-rel')||{}).value||ui.nc.rel||'').trim()||'integration';const id='c'+uid();if(!D.conns)D.conns={};D.conns[id]={id,fp:ui.nc.fp,fi:ui.nc.fi||'',tp:ui.nc.tp,ti:ui.nc.ti||'',rel,st:ui.nc.st};save();render();}
function delConn(id){delete D.conns[id];save();render();}

(function(){
  let raw=null;
  try{const s=localStorage.getItem('nbfi_v4');if(s)raw=JSON.parse(s);}catch(e){}
  D=normalise(raw||defaultData());
  if(!ui.sel){const ids=Object.keys(D.projects||{});ui.sel=ids[0]||null;}
  render();
})();
