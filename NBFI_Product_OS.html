<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <title>Системийн Архитектур & Телеметр Процесс v24.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; 
            --surface: #1e293b;
            --surface-light: #334155;
            --primary: #f8fafc;
            --primary-soft: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --error: #ef4444;
            --error-bg: rgba(239, 68, 68, 0.2);
            --error-path-bg: rgba(239, 68, 68, 0.08);
            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.1);
            --border: #334155;
            --line: #475569;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; overflow: hidden; color: var(--primary); }
        
        /* Дээд навигаци ба KPI */
        .top-nav {
            position: absolute; top: 0; left: 0; width: 100%; background: var(--surface);
            border-bottom: 1px solid var(--border); z-index: 100; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
        }
        .nav-header {
            display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; border-bottom: 1px solid var(--border);
        }
        .nav-header h1 { font-size: 16px; margin: 0; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        
        .kpi-board { display: flex; gap: 20px; padding: 12px 24px; background: rgba(15, 23, 42, 0.5); align-items: center; }
        .kpi-card { background: var(--surface-light); padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border); display: flex; flex-direction: column; min-width: 140px; }
        .kpi-value { font-size: 20px; font-weight: 700; color: var(--primary); }
        .kpi-label { font-size: 11px; color: var(--primary-soft); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
        .kpi-value.err-text { color: var(--error); }
        .kpi-value.succ-text { color: var(--success); }

        /* Ангилал болон Сонгох хэсэг */
        .filter-section {
            display: flex; gap: 12px; align-items: center; margin-left: auto; margin-right: 12px;
        }
        .node-selector {
            background: var(--bg); color: white; border: 1px solid var(--border);
            padding: 8px 12px; border-radius: 6px; font-size: 13px; font-family: inherit; outline: none; cursor: pointer; min-width: 160px;
        }
        .node-selector:focus { border-color: var(--accent); }
        .node-selector option { background: var(--surface); color: white; }

        /* Системийн ТАВ (Хуудаслалт) */
        .system-tabs {
            display: flex; gap: 6px; padding: 0 24px; background: rgba(15, 23, 42, 0.3); overflow-x: auto; border-bottom: 1px solid var(--border);
        }
        .sys-tab {
            padding: 10px 16px; font-size: 13px; font-weight: 600; color: var(--primary-soft); background: transparent; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: 0.2s; white-space: nowrap;
        }
        .sys-tab:hover { color: white; background: rgba(255,255,255,0.02); }
        .sys-tab.active-tab { color: var(--accent); border-bottom-color: var(--accent); background: rgba(59, 130, 246, 0.05); }
        .sys-tab.has-error { border-bottom-color: var(--error); color: #fca5a5; }

        /* Ажлын талбар */
        #canvas { 
            width: 100vw; height: 100vh; position: absolute; top:0; left:0; 
            background-image: radial-gradient(var(--border) 1px, transparent 1px); background-size: 24px 24px; cursor: grab;
        }
        #canvas:active { cursor: grabbing; }
        
        #viewport {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: 0 0;
            padding-top: 180px; pointer-events: none; transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        #svg-canvas { 
            position: absolute; top: 0; left: 0; width: 10000px; height: 10000px; pointer-events: none; z-index: 0; 
        }

        /* Үндсэн Систем блок */
        .node { 
            position: absolute; width: 260px; background: var(--surface); border: 1px solid var(--border); 
            border-radius: 12px; padding: 16px; cursor: grab; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2); 
            z-index: 10; transition: border-color 0.2s, box-shadow 0.2s; user-select: none; pointer-events: auto;
        }
        .node:hover { border-color: var(--accent); }
        .node.active { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
        .node.has-err-trace { border-color: var(--error); box-shadow: 0 0 15px rgba(239, 68, 68, 0.25); }
        .node-title { font-size: 15px; font-weight: 700; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;}
        .node-dept { font-size: 12px; color: var(--primary-soft); display: flex; align-items: center; gap:4px; }
        .node-health { font-size: 10px; padding: 2px 6px; border-radius: 4px; color: white; font-weight: bold; }

        /* Процессын алхмуудын блок */
        .step-block {
            position: absolute; width: 250px; background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px; font-size: 13px; box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            z-index: 10; transition: transform 0.2s, border-color 0.2s; cursor: pointer; user-select: none; pointer-events: auto;
        }
        .step-block:hover { border-color: var(--accent); transform: translateY(-1px); }
        .step-block.active-step { border-color: var(--accent); background: var(--surface-light); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3); }
        
        @keyframes pulse-critical { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .step-block.err-direct { border-color: var(--error); background: #311c1c; animation: pulse-critical 2s infinite; border-width: 1.5px; }
        
        @keyframes pulse-trace-border { 0% { border-color: rgba(239, 68, 68, 0.4); } 50% { border-color: rgba(239, 68, 68, 1); } 100% { border-color: rgba(239, 68, 68, 0.4); } }
        .step-block.err-propagated { border-color: var(--error); background: var(--error-path-bg); animation: pulse-trace-border 2.5s infinite; }
        
        .status-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; position: relative; }
        .status-pill { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .status-ok { background: var(--success-bg); color: var(--success); }
        .status-err { background: var(--error-bg); color: var(--error); }
        
        .note-indicator { font-size: 11px; cursor: help; opacity: 0.8; margin-left: 6px; transition: 0.2s; }
        .note-indicator:hover { opacity: 1; transform: scale(1.2); }
        
        .step-block .custom-note-tooltip {
            position: absolute; top: -10px; left: 105%; width: 240px;
            background: #ffffff; color: #334155; padding: 12px 16px;
            border-radius: 6px; box-shadow: 0 10px 25px rgba(0,0,0,0.25), 0 4px 10px rgba(0,0,0,0.12);
            border: 1px solid #cbd5e1; font-size: 13px; font-weight: 500; line-height: 1.5;
            white-space: normal; word-wrap: break-word; z-index: 1000; display: none; pointer-events: none;
        }
        .step-block .custom-note-tooltip::before {
            content: ""; position: absolute; top: 18px; left: -6px;
            border-width: 6px 6px 6px 0; border-style: solid; border-color: transparent #ffffff transparent transparent;
        }
        .step-block:hover .custom-note-tooltip { display: block; }

        .step-meta-row { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--primary-soft); margin-top: 6px; border-top: 1px dashed rgba(255,255,255,0.08); padding-top: 4px; }
        .checklist-indicator { font-weight: 500; font-size: 11px; }
        .checklist-indicator.done { color: var(--success); font-weight: 600; }
        .checklist-indicator.has-unchecked { color: var(--error); font-weight: 600; }
        
        /* Удирдлагын самбар */
        .side-panel { 
            position: fixed; right: -500px; top: 0; width: 480px; background: var(--surface); 
            height: 100vh; box-shadow: -10px 0 30px rgba(0,0,0,0.3); 
            display: flex; flex-direction: column; z-index: 101; transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-left: 1px solid var(--border);
        }
        .side-panel.open { right: 0; }
        .panel-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--surface-light); }
        .panel-header h3 { margin: 0; font-size: 16px; font-weight: 700; color: white; }
        .btn-close-icon { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--primary-soft); }
        .btn-close-icon:hover { color: white; }
        
        .panel-body { padding: 24px; overflow-y: auto; flex: 1; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--primary-soft); margin-bottom: 8px; text-transform: uppercase; }
        
        .edit-input { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); color: white; border-radius: 6px; font-size: 13px; font-family: inherit; }
        .edit-input:focus { outline: none; border-color: var(--accent); }
        .edit-textarea { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); color: white; border-radius: 6px; font-size: 13px; font-family: inherit; resize: vertical; min-height: 70px; }
        .edit-textarea:focus { outline: none; border-color: var(--accent); }
        
        .section-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 20px; }
        .toggle-group { display: flex; background: var(--bg); border-radius: 6px; padding: 4px; border: 1px solid var(--border); }
        .toggle-btn { flex: 1; padding: 8px 14px; font-size: 12px; font-weight: 600; border: none; border-radius: 4px; cursor: pointer; background: transparent; color: var(--primary-soft); transition: 0.2s; }
        .toggle-btn.active-ok { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .toggle-btn.active-err { background: var(--error); color: white; }

        .btn { padding: 10px 16px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 13px; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--primary); }
        .btn-success { background: var(--success); color: white; }
        .btn-sm { padding: 8px 12px; font-size: 12px; }
        .btn-danger-text { background: none; color: var(--error); border: none; cursor: pointer; font-size: 12px; font-weight: 600; }
        
        .task-list-scroll { max-height: 250px; overflow-y: auto; margin-top: 10px; padding-right: 5px;}
        .task-row { display: flex; gap: 6px; align-items: center; margin-bottom: 10px; }

        .check-item-row { display: flex; align-items: center; gap: 10px; background: var(--surface); padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border); margin-bottom: 8px; }
        .check-item-row input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--success); }
        .check-item-row .chk-text { flex: 1; background: transparent; border: none; color: white; font-size: 13px; }
        .check-item-row .chk-text:focus { outline: none; border-bottom: 1px solid var(--accent); }

        /* Лог ба Тайлангийн хэсэг */
        .log-item { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 10px; font-size: 12px; }
        .log-item-header { display: flex; justify-content: space-between; font-weight: 600; margin-bottom: 6px; }
        .log-text { color: #ffffff; font-weight: 600; font-size: 13px; margin-bottom: 6px;}
        .log-time-row { display: flex; flex-direction: column; gap: 3px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.04); margin-top: 6px; }
        .log-time-lbl { font-size: 11px; color: var(--primary-soft); display: flex; justify-content: space-between; }
        .log-time-lbl b { color: #f8fafc; font-family: monospace; }
        .log-comment { font-style: italic; color: #cbd5e1; background: rgba(59, 130, 246, 0.15); border-left: 2px solid var(--accent); padding: 6px 10px; border-radius: 0 4px 4px 0; margin-top: 6px; }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="nav-header">
        <h1><span>⚡</span> System Architecture & Telemetry Tracker v24.0</h1>
        <div class="filter-section">
            <select id="category-filter" class="node-selector" onchange="onCategoryFilterChange(this.value)">
                <option value="">📁 Бүх ангилал...</option>
            </select>
            
            <button class="btn btn-outline btn-sm" style="border-color: var(--accent); color: white; background: rgba(59, 130, 246, 0.1);" onclick="centerCanvas()">🎯 Голлуулах</button>
            <button class="btn btn-outline btn-sm" style="border-color: #eab308; color: #fde047; background: rgba(234, 179, 8, 0.1);" onclick="viewSystemLogs()">📋 Лог & Тайлан Харах</button>

            <button id="undo-btn" class="btn btn-outline btn-sm" style="display:none; background: rgba(59, 130, 246, 0.1); border-color: var(--accent); color: var(--accent);" onclick="triggerUndo()">↺ Буцаах (Undo)</button>
            <button class="btn btn-success btn-sm" onclick="exportData()">📤 Дата Экспорт</button>

                <input type="file" id="import-file" style="display:none;" onchange="importData(event)">

            <button class="btn btn-outline btn-sm" style="border-color: rgba(239, 68, 68, 0.4); color: var(--error);" onclick="clearData()">⚠️ Цэвэрлэх</button>

        </div>
    </div>

    <div class="system-tabs" id="system-tabs-container"></div>

    <div class="kpi-board">
        <div class="kpi-card">
            <span class="kpi-value" id="kpi-total">0</span>
            <span class="kpi-label">Идэвхтэй алхам</span>
        </div>
        <div class="kpi-card">
            <span class="kpi-value err-text" id="kpi-errors">0</span>
            <span class="kpi-label">Гэмтэлтэй (Critical)</span>
        </div>
        <div class="kpi-card">
            <span class="kpi-value succ-text" id="kpi-health">100%</span>
            <span class="kpi-label">Системийн эрүүл мэнд</span>
        </div>
        <button class="btn btn-outline btn-sm" id="edit-current-sys-btn" style="margin-left: auto; font-size:12px;" onclick="editCurrentSystem()">⚙️ Энэ хуудасны тохиргоо</button>
    </div>
</div>

<div id="canvas">
    <div id="viewport">
        <svg id="svg-canvas"></svg>
    </div>
</div>

<div id="side-panel" class="side-panel">
    <div class="panel-header">
        <h3 id="panel-title">⚙️ Удирдлага</h3>
        <button class="btn-close-icon" onclick="closePanel()">×</button>
    </div>
    <div id="panel-content" class="panel-body"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAshzmrzBPPhADwrASmQQAUnTqdnd5MM4",
        authDomain: "omni-products.firebaseapp.com",
        databaseURL: "https://omni-products-default-rtdb.firebaseio.com",
        projectId: "omni-products",
        storageBucket: "omni-products.firebasestorage.app",
        messagingSenderId: "879805024712",
        appId: "1:879805024712:web:9b694019cf8388953998fd",
        measurementId: "G-KQND2ECQ33"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    // Гаднаас дуудаж ашиглах Firebase функцуудыг Глобал болгох
    window.fbDatabase = database;
    window.fbRef = ref;
    window.fbSet = set;

    // Firebase Realtime Баазаас датаг Live сонсож ачаалах
    const telemetryRef = ref(database, 'sys_telemetry_nodes');
    onValue(telemetryRef, (snapshot) => {
        const data = snapshot.val();
        if (data && Array.isArray(data)) {
            nodes = data;
            // Хэрэв идэвхтэй хуудас байхгүй эсвэл устсан бол эхний хуудсыг сонгоно
            if (!currentSystemId && nodes.length > 0) {
                currentSystemId = nodes[0].id;
            }
            if (currentSystemId && !nodes.some(n => n.id === currentSystemId) && nodes.length > 0) {
                currentSystemId = nodes[0].id;
            }
            renderTabs();
            updateCategoryDropdown();
            renderMainCanvasOnly();
            updateDashboardKPIs();
        } else if (!data) {
            // Хэрэв Firebase бүрэн хоосон бол Анхны демо өгөгдлийг үүсгэнэ
            const initialDemo = generateDefaultDemoData();
            nodes = initialDemo;
            currentSystemId = nodes[0].id;
            set(telemetryRef, nodes);
        }
    });
</script>

<script>
    const canvas = document.getElementById('canvas');
    const viewport = document.getElementById('viewport');
    const svgCanvas = document.getElementById('svg-canvas');
    const panel = document.getElementById('side-panel');
    const content = document.getElementById('panel-content');
    const categoryFilter = document.getElementById('category-filter');
    const tabsContainer = document.getElementById('system-tabs-container');

    const STORAGE_KEY = 'sys_admin_telemetry_v24';
    let undoHistory = [];
    
    let panX = 100;
    let panY = 50;
    let zoom = 1;
    let isPanning = false;
    let startPanX = 0;
    let startPanY = 0;

    let currentSystemId = null;
    let selectedCategory = "";
    let nodes = []; // Firebase-ээс live дүүрнэ

    function getFormattedTimestamp() {
        const d = new Date();
        const pad = (n) => n.toString().padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function calculateDuration(startStr, endStr) {
        if (!startStr || !endStr) return null;
        const start = new Date(startStr.replace(' ', 'T'));
        const end = new Date(endStr.replace(' ', 'T'));
        if (isNaN(start) || Math.isNaN(end)) return null;
        
        const diffMs = end - start;
        if (diffMs < 0) return "0м";
        
        const diffMins = Math.floor(diffMs / 60000);
        const hrs = Math.floor(diffMins / 60);
        const mins = diffMins % 60;
        
        if (hrs > 0) return `${hrs}ц ${mins}м`;
        return `${mins}м`;
    }

    function generateDefaultDemoData() {
        const timeNow = getFormattedTimestamp();
        return [
            { id: 1, name: "Хугацаа хэтэрсэн төлөлт", x: 50, y: 150, dept: "Зээлийн газар", category: "Зээлийн алба", isOpen: true, children: [
                { id: 101, text: "Үндсэн зээлийн төлөлт", status: "ok", duration: "120ms", time: "11:33", created_at: timeNow, detected_at: null, checked_at: timeNow, comment: "Хүсэлт амжилттай баталгаажсан", children: [], checklist: [] },
                { id: 103, text: "Алданги тооцоолол хэсэг", status: "error", errorMsg: "Шалгах талбар дутуу", duration: "850ms", time: "09:15", created_at: "2026-05-27 21:30:00", detected_at: "2026-05-28 09:15:00", checked_at: null, checklist: [
                    { id: 1, text: "Алдангийн хувь хэмжээ тулгалт", checked: true },
                    { id: 2, text: "Бодогдсон үлдэгдэл шалгах", checked: false }
                ], children: [] }
            ]}
        ];
    }

    canvas.addEventListener('mousedown', (e) => {
        if (e.target.closest('.node') || e.target.closest('.step-block') || e.target.closest('#side-panel') || e.target.closest('.top-nav')) return;
        viewport.style.transition = 'none';
        isPanning = true;
        startPanX = e.clientX - panX;
        startPanY = e.clientY - panY;
    });

    window.addEventListener('mousemove', (e) => {
        if (!isPanning) return;
        panX = e.clientX - startPanX;
        panY = e.clientY - startPanY;
        applyTransform();
    });

    window.addEventListener('mouseup', () => { isPanning = false; });

    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        viewport.style.transition = 'none';
        const zoomIntensity = 0.05;
        const mouseX = e.clientX;
        const mouseY = e.clientY;
        const zoomFactor = e.deltaY < 0 ? (1 + zoomIntensity) : (1 - zoomIntensity);
        
        if (zoom * zoomFactor < 0.2 || zoom * zoomFactor > 1.8) return;

        panX = mouseX - (mouseX - panX) * zoomFactor;
        panY = mouseY - (mouseY - panY) * zoomFactor;
        zoom *= zoomFactor;
        
        applyTransform();
    }, { passive: false });

    function applyTransform() {
        viewport.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
        canvas.style.backgroundPosition = `${panX}px ${panY}px`;
    }

    function centerCanvas() {
        viewport.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)';
        const node = nodes.find(n => n.id === currentSystemId);
        if (node) {
            zoom = 1;
            panX = 120 - node.x;
            panY = 120 - node.y;
        } else {
            panX = 100;
            panY = 50;
            zoom = 1;
        }
        applyTransform();
    }

    function viewSystemLogs() {
        const node = nodes.find(n => n.id === currentSystemId);
        if (!node) return;

        panel.classList.add('open');
        document.getElementById('panel-title').innerHTML = `📋 Системийн Лог & Тайлан: ${node.name}`;
        
        const allSteps = flattenSteps(node.children || []);
        
        if (allSteps.length === 0) {
            content.innerHTML = `<div style="text-align:center; color:var(--primary-soft); padding: 40px 0;">Бүртгэгдсэн алхам, урсгал одоогоор байхгүй байна.</div>`;
            return;
        }

        let logsHTML = `<div class="section-box" style="margin-bottom:12px; background: rgba(59, 130, 246, 0.05);">
            <div style="font-size:12px; color:var(--primary-soft);">Нийт <b>${allSteps.length}</b> алхмын хугацааны мөчлөгийг доор нэгтгэв.</div>
        </div>`;

        allSteps.forEach(step => {
            const isDirectError = isStepDirectError(step);
            const statusText = isDirectError ? "CRITICAL (Засагдаагүй)" : "OK / ЧЕКЛЭГДСЭН";
            const statusColor = isDirectError ? "var(--error)" : "var(--success)";
            const statusBg = isDirectError ? "var(--error-bg)" : "var(--success-bg)";
            
            const resolveTimeText = calculateDuration(step.detected_at, step.checked_at);

            logsHTML += `
                <div class="log-item" style="border-left: 4px solid ${statusColor};">
                    <div class="log-item-header">
                        <span style="color: ${statusColor}; background: ${statusBg}; padding: 2px 6px; border-radius:4px; font-size:10px; font-weight:700;">${statusText}</span>
                        <span style="color: var(--primary-soft);">⏱️ Сүүлийн цикл: ${step.duration || '0ms'}</span>
                    </div>
                    <div class="log-text">${step.text}</div>
                    
                    <div class="log-time-row">
                        <div class="log-time-lbl">➕ Бүртгэгдсэн цаг: <b>${step.created_at || 'Тодорхойгүй'}</b></div>
                        <div class="log-time-lbl">⚠️ Алдаа илрүүлсэн цаг: <b>${step.detected_at || 'Алдаа гараагүй'}</b></div>
                        <div class="log-time-lbl">✅ Чеклэж хаасан цаг: <b>${step.checked_at || (isDirectError ? 'Шийдвэрлэгдээгүй байна' : 'Хэвийн хаагдсан')}</b></div>
                        ${resolveTimeText ? `<div class="log-time-lbl" style="color: #67e8f9; font-weight:600; margin-top:2px; border-top:1px dashed rgba(255,255,255,0.1); padding-top:2px;">⚡ Засалтын нийт хурд: <span>${resolveTimeText}</span></div>` : ''}
                    </div>

                    ${step.status === 'error' && step.errorMsg ? `<div style="color:#fca5a5; font-size:11px; margin-top:6px; font-weight:500;">❌ Алдааны тайлбар: ${step.errorMsg}</div>` : ''}
                    ${step.comment && step.comment.trim() !== '' ? `<div class="log-comment">💬 Таны оруулсан тайлбар: <br>${step.comment}</div>` : ''}
                </div>
            `;
        });

        content.innerHTML = `<div style="display:flex; flex-direction:column; gap:2px;">${logsHTML}</div>`;
    }

    function pushToUndoHistory() {
        undoHistory.push(JSON.stringify(nodes));
        if (undoHistory.length > 20) undoHistory.shift(); 
        updateUndoButtonVisibility();
    }

    function triggerUndo() {
        if (undoHistory.length === 0) return;
        nodes = JSON.parse(undoHistory.pop());
        closePanel();
        save();
        updateUndoButtonVisibility();
    }

    function updateUndoButtonVisibility() {
        document.getElementById('undo-btn').style.display = undoHistory.length > 0 ? 'inline-flex' : 'none';
    }

    window.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') { e.preventDefault(); triggerUndo(); }
    });

    // ХУУЧИН LOCALSTORAGE-ООС ЭХЛЭХЭД УНШИХ (БААЗ ХООСОН ҮЕД АШИГЛАХАД ЗОРИУЛЖ БҮТЭН БЭЛДЭВ)
    let rawSavedData = localStorage.getItem(STORAGE_KEY);
    if (rawSavedData && rawSavedData !== '[]' && nodes.length === 0) {
        try { nodes = JSON.parse(rawSavedData); } catch(e){}
    }

    let expandedSteps = { 103: true }; 
    let selectedStepGlobal = null; 
    let selectedNodeGlobal = null;

    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(nodes, null, 2));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", `moni_pages_backup_${new Date().toISOString().slice(0,10)}.json`);
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    function updateFieldSilently(key, value) {
        let itemToUpdate = selectedStepGlobal || selectedNodeGlobal;
        if (!itemToUpdate) return;
        
        itemToUpdate[key] = value;

        if (selectedStepGlobal && key === 'comment' && value.trim() !== '') {
            if (!selectedStepGlobal.detected_at) {
                selectedStepGlobal.detected_at = getFormattedTimestamp();
            }
        }

        save(); // Local + Firebase рүү зэрэг хадгална
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) { 
                    pushToUndoHistory(); 
                    nodes = imported; 
                    if(nodes.length > 0) currentSystemId = nodes[0].id;
                    save(); 
                    alert("✅ Дата амжилттай сэргээгдлээ!"); 
                } else { alert("❌ Буруу файлын бүтэц!"); }
            } catch (err) { alert("❌ Файлыг уншиж чадсангүй!"); }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    // ХАДГАЛАХ СИСТЕМ: Firebase Realtime Database руу Live түлхэнэ
    function save() { 
        localStorage.setItem(STORAGE_KEY, JSON.stringify(nodes)); 
        updateDashboardKPIs(); 
        
        if (window.fbSet && window.fbDatabase && window.fbRef) {
            window.fbSet(window.fbRef(window.fbDatabase, 'sys_telemetry_nodes'), nodes)
                .catch(err => console.error("Firebase live save error:", err));
        }
    }

    function flattenSteps(items) {
        let all = []; if (!items) return all;
        items.forEach(i => { all.push(i); if(i.children) all = all.concat(flattenSteps(i.children)); });
        return all;
    }

    function isStepDirectError(step) {
        if (!step) return false;
        if (step.status === 'error') return true;
        if (step.checklist && step.checklist.length > 0) {
            return step.checklist.some(c => !c.checked);
        }
        return false;
    }

    function checkHasErrorRecursive(step) {
        if (!step) return false;
        if (isStepDirectError(step)) return true;
        if (step.children && step.children.length > 0) {
            return step.children.some(child => checkHasErrorRecursive(child));
        }
        return false;
    }

    function updateCategoryDropdown() {
        const categories = new Set();
        nodes.forEach(n => { if(n.category) categories.add(n.category); });
        
        const prevValue = categoryFilter.value;
        categoryFilter.innerHTML = '<option value="">📁 Бүх ангилал...</option>';
        categories.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat; opt.innerText = `📂 ${cat}`;
            categoryFilter.appendChild(opt);
        });
        categoryFilter.value = prevValue;
    }

    function onCategoryFilterChange(val) {
        selectedCategory = val;
        renderTabs();
        const filtered = nodes.filter(n => !selectedCategory || n.category === selectedCategory);
        if(filtered.length > 0 && !filtered.some(n => n.id === currentSystemId)) {
            switchPage(filtered[0].id);
        } else if(filtered.length === 0) {
            currentSystemId = null;
            renderMainCanvasOnly();
        }
    }

    function renderTabs() {
        tabsContainer.innerHTML = '';
        const filteredNodes = nodes.filter(n => !selectedCategory || n.category === selectedCategory);
        
        filteredNodes.forEach(node => {
            const btn = document.createElement('button');
            const steps = flattenSteps(node.children || []);
            const hasErr = steps.some(s => checkHasErrorRecursive(s));
            
            btn.className = `sys-tab ${currentSystemId === node.id ? 'active-tab' : ''} ${hasErr ? 'has-error' : ''}`;
            btn.innerHTML = `💻 ${node.name} ${hasErr ? '⚠️' : ''}`;
            btn.onclick = () => switchPage(node.id);
            tabsContainer.appendChild(btn);
        });
    }

    function switchPage(id) {
        currentSystemId = id;
        selectedStepGlobal = null;
        selectedNodeGlobal = nodes.find(n => n.id === id);
        closePanel();
        renderTabs();
        renderMainCanvasOnly();
        updateDashboardKPIs();
    }

    function updateDashboardKPIs() {
        const currentNode = nodes.find(n => n.id === currentSystemId);
        if(!currentNode) {
            document.getElementById('kpi-total').innerText = 0;
            document.getElementById('kpi-errors').innerText = 0;
            document.getElementById('kpi-health').innerText = "100%";
            return;
        }
        let totalSteps = 0; let errors = 0;
        const steps = flattenSteps(currentNode.children || []);
        totalSteps = steps.length;
        steps.forEach(s => { if(isStepDirectError(s)) errors++; });

        document.getElementById('kpi-total').innerText = totalSteps;
        document.getElementById('kpi-errors').innerText = errors;
        let health = totalSteps === 0 ? 100 : Math.round(((totalSteps - errors) / totalSteps) * 100);
        document.getElementById('kpi-health').innerText = `${health}%`;
        document.getElementById('kpi-health').className = `kpi-value ${health < 90 ? 'err-text' : 'succ-text'}`;
    }

    function drawLine(x1, y1, x2, y2, isErrorPath) {
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        const dx = Math.abs(x2 - x1) * 0.4;
        const d = `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}`;
        path.setAttribute("d", d);
        path.setAttribute("stroke", isErrorPath ? "var(--error)" : "var(--line)");
        path.setAttribute("stroke-width", isErrorPath ? "2.5" : "1.8");
        path.setAttribute("fill", "none");
        
        if(isErrorPath) {
            path.setAttribute("stroke-dasharray", "6,4");
            const animate = document.createElementNS("http://www.w3.org/2000/svg", "animate");
            animate.setAttribute("attributeName", "stroke-dashoffset");
            animate.setAttribute("values", "20;0");
            animate.setAttribute("dur", "0.6s");
            animate.setAttribute("repeatCount", "indefinite");
            path.appendChild(animate);
        }
        svgCanvas.appendChild(path);
    }

    const BLOCK_H = 92; const GAP_Y = 24;

    function getSubtreeHeight(step) {
        if (!expandedSteps[step.id] || !step.children || step.children.length === 0) return BLOCK_H;
        let h = 0;
        step.children.forEach((c, i) => { h += getSubtreeHeight(c); if (i > 0) h += GAP_Y; });
        return Math.max(BLOCK_H, h);
    }

    let linesToDraw = [];

    function renderMainCanvasOnly() {
        viewport.querySelectorAll('.node, .step-block').forEach(n => n.remove());
        svgCanvas.innerHTML = '';
        linesToDraw = []; 

        const node = nodes.find(n => n.id === currentSystemId);
        if (!node) return;

        const div = document.createElement('div');
        const nodeSteps = flattenSteps(node.children || []);
        const hasErrorInSystem = nodeSteps.some(s => checkHasErrorRecursive(s));

        div.className = `node ${selectedNodeGlobal && selectedNodeGlobal.id === node.id && !selectedStepGlobal ? 'active' : ''} ${hasErrorInSystem ? 'has-err-trace' : ''}`;
        div.style.left = node.x + 'px'; div.style.top = node.y + 'px';
        div.innerHTML = `
            <div class="node-title">${node.name} <span class="node-health" style="background:${hasErrorInSystem ? 'var(--error)' : 'var(--success)'};">${hasErrorInSystem ? 'АЛДААТАЙ' : 'ХЭВИЙН'}</span></div>
            <div class="node-dept">🏢 ${node.dept || 'Салбаргүй'} ${node.category ? `• [${node.category}]` : ''}</div>
        `;
        div.onmousedown = (e) => { e.stopPropagation(); startDrag(e, node); };
        div.onclick = (e) => { 
            if(!div.dataset.dragged) { selectedStepGlobal = null; selectedNodeGlobal = node; editCurrentSystem(); renderMainCanvasOnly(); }
            delete div.dataset.dragged;
        };
        viewport.appendChild(div);

        if (node.children && node.children.length > 0) {
            calculateLevelPositions(node.children, node.x + 320, node.y + 36, node.x + 260, node.y + 36);
        }

        linesToDraw.forEach(line => {
            drawLine(line.x1, line.y1, line.x2, line.y2, line.isErrorPath);
        });
    }

    function calculateLevelPositions(steps, currentX, parentCenterY, parentOutX, parentOutY) {
        if (!steps || steps.length === 0) return;
        let totalHeight = 0;
        steps.forEach((step, i) => { totalHeight += getSubtreeHeight(step); if (i > 0) totalHeight += GAP_Y; });
        let currentY = parentCenterY - (totalHeight / 2);

        steps.forEach((step) => {
            const sh = getSubtreeHeight(step);
            const stepCenterY = currentY + (sh / 2);
            const stepTop = stepCenterY - (BLOCK_H / 2);
            const isExpanded = expandedSteps[step.id];
            
            const isDirectError = isStepDirectError(step); 
            const isErrorPath = checkHasErrorRecursive(step); 

            linesToDraw.push({
                x1: parentOutX,
                y1: parentOutY,
                x2: currentX,
                y2: stepTop + (BLOCK_H / 2),
                isErrorPath: isErrorPath
            });

            const stepDiv = document.createElement('div');
            let errorStyleClass = isDirectError ? 'err-direct' : (isErrorPath ? 'err-propagated' : '');

            stepDiv.className = `step-block ${errorStyleClass} ${selectedStepGlobal && selectedStepGlobal.id === step.id ? 'active-step' : ''}`;
            stepDiv.style.left = currentX + 'px'; stepDiv.style.top = stepTop + 'px'; stepDiv.style.height = BLOCK_H + 'px';

            const hasChildren = step.children && step.children.length > 0;
            const chkList = step.checklist || [];
            const totalChecks = chkList.length;
            const completedChecks = chkList.filter(c => c.checked).length;
            let checklistHTML = '';
            if (totalChecks > 0) {
                const isAllDone = totalChecks === completedChecks;
                checklistHTML = `<span class="checklist-indicator ${isAllDone ? 'done' : 'has-unchecked'}">📋 Өгөгдөл: ${completedChecks}/${totalChecks}</span>`;
            } else {
                checklistHTML = `<span style="opacity:0.3;">📋 Үл үзэгдэх</span>`;
            }

            let customErrorMsg = step.errorMsg || '';
            if (step.status === 'ok' && totalChecks > completedChecks) {
                customErrorMsg = "Шалгах талбар дутуу";
            }

            let noteIndicatorHTML = '';
            let noteTooltipHTML = '';
            if (step.comment && step.comment.trim() !== '') {
                noteIndicatorHTML = `<span class="note-indicator">📄</span>`;
                noteTooltipHTML = `<div class="custom-note-tooltip">
                    <b>Тэмдэглэл:</b><br>${step.comment.replace(/\n/g, '<br>')}
                    ${step.detected_at ? `<br><small style="color:#94a3b8; font-size:10px;">⚠️ Илрүүлсэн: ${step.detected_at}</small>` : ''}
                </div>`;
            }

            stepDiv.innerHTML = `
                <div class="status-header">
                    <span class="status-pill ${isDirectError ? 'status-err' : (isErrorPath ? 'status-err' : 'status-ok')}">
                        ${isDirectError ? 'CRITICAL' : (isErrorPath ? 'TRACE ERR' : 'OK')}
                    </span>
                    <div style="display: flex; align-items: center; gap: 4px;">
                        ${noteIndicatorHTML}
                        ${hasChildren ? `<span style="font-size:10px; color:var(--primary-soft);">${isExpanded ? '▼' : '▶'}</span>` : ''}
                    </div>
                </div>
                <div style="font-weight:600; font-size:13px; color:white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${step.text}</div>
                ${isDirectError && customErrorMsg ? `<div style="font-size:11px; color:#fca5a5; margin-top:2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">↳ ${customErrorMsg}</div>` : ''}
                
                <div class="step-meta-row">
                    ${checklistHTML}
                    <span>⏱️ ${step.duration || '0ms'}</span>
                </div>
                ${noteTooltipHTML}
            `;

            stepDiv.onclick = (e) => {
                e.stopPropagation(); selectedStepGlobal = step; selectedNodeGlobal = null;
                if(e.target.closest('.status-header span') || e.target.closest('.note-indicator') || e.target.closest('.status-header div')) {
                    if(expandedSteps[step.id]) delete expandedSteps[step.id]; else expandedSteps[step.id] = true;
                }
                openStepEditor(step); renderMainCanvasOnly();
            };
            viewport.appendChild(stepDiv);

            if (isExpanded && hasChildren) {
                calculateLevelPositions(step.children, currentX + 310, stepTop + (BLOCK_H / 2), currentX + 250, stepTop + (BLOCK_H / 2));
            }
            currentY += sh + GAP_Y;
        });
    }

    function editCurrentSystem() {
        const node = nodes.find(n => n.id === currentSystemId);
        if(node) { selectedNodeGlobal = node; selectedStepGlobal = null; openProgramEditor(node); }
    }

    function openStepEditor(step) {
        panel.classList.add('open');
        document.getElementById('panel-title').innerHTML = `📝 Алхам Тохиргоо`;
        if(!step.checklist) step.checklist = [];
        if(!step.comment) step.comment = "";
        
        const totalChecks = step.checklist.length;
        const completedChecks = step.checklist.filter(c=>c.checked).length;
        const hasUncheckedError = totalChecks > completedChecks;

        let html = `
            <div class="section-box" style="border-color: ${(step.status==='error' || hasUncheckedError) ? 'var(--error)' : 'var(--border)'};">
                <div class="form-group">
                    <label>Үйлдлийн нэр</label>
                    <input type="text" class="edit-input" value="${step.text}" oninput="updateFieldSilently('text', this.value)">
                </div>
                
                <div style="display:flex; gap:10px;" class="form-group">
                    <div style="flex:1;">
                        <label>Цикл хугацаа</label>
                        <input type="text" class="edit-input" value="${step.duration || '30ms'}" placeholder="Жишээ: 120ms" oninput="updateFieldSilently('duration', this.value)">
                    </div>
                    <div style="flex:1;">
                        <label>Цагийн тамга</label>
                        <input type="text" class="edit-input" value="${step.time || '11:33'}" placeholder="Жишээ: 11:33" oninput="updateFieldSilently('time', this.value)">
                    </div>
                </div>

                <div class="form-group">
                    <label style="color: #60a5fa;">Шалгах тайлбар оруулах (Алдааны лог)</label>
                    <textarea class="edit-textarea" placeholder="Өглөө илрүүлсэн алдааны тайлбараа энд бичнэ үү..." oninput="updateFieldSilently('comment', this.value)">${step.comment}</textarea>
                </div>

                <div class="form-group">
                    <label>Төлөв удирдлага</label>
                    <div class="toggle-group">
                        <button class="toggle-btn ${step.status === 'ok' ? 'active-ok' : ''}" onclick="changeStepStatusDirect('ok')">ХЭВИЙН</button>
                        <button class="toggle-btn ${step.status === 'error' ? 'active-err' : ''}" onclick="changeStepStatusDirect('error')">АЛДААТАЙ</button>
                    </div>
                </div>
                ${step.status === 'error' ? `
                <div class="form-group">
                    <label style="color:var(--error);">Алдааны систем мессеж</label>
                    <input type="text" class="edit-input" style="border-color:var(--error);" value="${step.errorMsg || ''}" placeholder="Жишээ: Шалгах талбар дутуу" oninput="updateFieldSilently('errorMsg', this.value)">
                </div>` : ''}
            </div>

            <div class="section-box" style="background: rgba(0,0,0,0.2); font-size:11px;">
                <label style="color:var(--primary-soft); font-weight:700; margin-bottom:6px; display:block;">⏱️ ХУГАЦААНЫ БҮРТГЭЛҮҮД</label>
                <div style="display:flex; flex-direction:column; gap:4px;">
                    <div>• Анх нэмэгдсэн: <span style="font-family:monospace; color:#fff">${step.created_at || 'Бүртгэгдээгүй'}</span></div>
                    <div>• Алдаа илрүүлсэн: <span style="font-family:monospace; color:var(--error)">${step.detected_at || 'Алдаа илрүүлээгүй'}</span></div>
                    <div>• Чеклэж зассан: <span style="font-family:monospace; color:var(--success)">${step.checked_at || 'Шийдвэрлэгдээгүй'}</span></div>
                </div>
            </div>

            <div class="section-box" style="border-top: 2px solid ${hasUncheckedError ? 'var(--error)' : 'var(--success)'};">
                <label style="font-size:12px; font-weight:700; color:${hasUncheckedError ? 'var(--error)' : 'var(--success)'}; display:flex; justify-content:space-between;">
                    <span>📋 ӨГӨГДӨЛ ИЛГЭЭЛТИЙН ЧЕК ЛИСТ</span>
                    <span>${completedChecks}/${totalChecks}</span>
                </label>
                <div style="margin-top:12px;" id="checklist-container">
                    ${step.checklist.map((item, index) => `
                        <div class="check-item-row" style="${!item.checked ? 'border-color: rgba(239, 68, 68, 0.4); background: #241919;' : ''}">
                            <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggleCheckItem(${index}, this.checked)">
                            <input type="text" class="chk-text" value="${item.text}" oninput="updateCheckItemText(${index}, this.value)">
                            <button class="btn-danger-text" onclick="deleteCheckItem(${index})">✕</button>
                        </div>
                    `).join('')}
                </div>
                <button class="btn btn-outline btn-sm" style="width:100%;" onclick="addCustomCheckItem()">+ Шалгах талбар нэмэх</button>
            </div>

            <div class="section-box">
                <label style="font-size:11px; font-weight:700; color:var(--primary-soft); text-transform:uppercase;">Дэд алхмууд (${(step.children || []).length})</label>
                <div class="task-list-scroll">
                    ${(step.children || []).map((child, i) => `
                        <div class="task-row">
                            <input type="text" class="edit-input" value="${child.text}" oninput="updateChildData(${child.id}, this.value)">
                            <button class="btn-danger-text" onclick="deleteChildItemConfirm(${child.id}, '${child.text.replace(/'/g, "\\'")}')">Устгах</button>
                        </div>
                    `).join('')}
                </div>
                <button class="btn btn-outline btn-sm" style="width:100%; margin-top:10px;" onclick="addChildToStep()">+ Дэд алхам салаалах</button>
            </div>
            <button class="btn btn-danger-text" style="width:100%; margin-top:10px; border: 1px solid var(--error);" onclick="deleteStepConfirm(${step.id}, '${step.text.replace(/'/g, "\\'")}')">Алхмыг бүрмөсөн устгах</button>
        `;
        content.innerHTML = html;
    }

    function changeStepStatusDirect(newStatus) {
        if (!selectedStepGlobal) return;
        pushToUndoHistory();
        
        selectedStepGlobal.status = newStatus;
        const now = getFormattedTimestamp();

        if (newStatus === 'error') {
            if (!selectedStepGlobal.detected_at) {
                selectedStepGlobal.detected_at = now; 
            }
            selectedStepGlobal.checked_at = null; 
        } else {
            const allChecked = !selectedStepGlobal.checklist || selectedStepGlobal.checklist.every(c => c.checked);
            if (allChecked) {
                selectedStepGlobal.checked_at = now;
            }
        }

        save();
        openStepEditor(selectedStepGlobal);
    }

    function toggleCheckItem(index, isChecked) { 
        if(selectedStepGlobal) { 
            pushToUndoHistory(); 
            selectedStepGlobal.checklist[index].checked = isChecked; 
            
            const now = getFormattedTimestamp();
            const totalChecks = selectedStepGlobal.checklist.length;
            const completedChecks = selectedStepGlobal.checklist.filter(c => c.checked).length;
            
            if (completedChecks < totalChecks) {
                if (!selectedStepGlobal.detected_at) {
                    selectedStepGlobal.detected_at = now;
                }
                selectedStepGlobal.checked_at = null; 
            } else if (completedChecks === totalChecks && selectedStepGlobal.status === 'ok') {
                selectedStepGlobal.checked_at = now;
            }

            save(); 
            openStepEditor(selectedStepGlobal); 
        } 
    }
    
    function updateCheckItemText(index, text) { 
        if(selectedStepGlobal && selectedStepGlobal.checklist && selectedStepGlobal.checklist[index]) { 
            selectedStepGlobal.checklist[index].text = text; 
            // Хэт их хүсэлт Firebase рүү шидэхгүйн тулд зөвхөн Local-д хадгалж, засагдаж дуусахад бааз руу save() хийнэ
            localStorage.setItem(STORAGE_KEY, JSON.stringify(nodes));
        } 
    }
    
    function deleteCheckItem(index) { if(selectedStepGlobal) { pushToUndoHistory(); selectedStepGlobal.checklist.splice(index, 1); save(); openStepEditor(selectedStepGlobal); } }
    
    function addCustomCheckItem() { 
        if(selectedStepGlobal) { 
            pushToUndoHistory(); 
            const now = getFormattedTimestamp();
            selectedStepGlobal.checklist.push({ id: Date.now(), text: "Шинэ шалгах талбар", checked: false }); 
            
            if (!selectedStepGlobal.detected_at) {
                selectedStepGlobal.detected_at = now;
            }
            selectedStepGlobal.checked_at = null;

            save(); 
            openStepEditor(selectedStepGlobal); 
        } 
    }

    function openProgramEditor(node) {
        panel.classList.add('open'); 
        document.getElementById('panel-title').innerHTML = `⚙️ Систем (Page) Тохиргоо`;
        let html = `
            <div class="section-box">
                <div class="form-group"><label>Системийн нэр</label><input type="text" class="edit-input" value="${node.name}" oninput="updateFieldSilently('name', this.value)"></div>
                <div class="form-group"><label>Ангилал / Бүлэг</label><input type="text" class="edit-input" value="${node.category || ''}" placeholder="Жишээ: Зээл, Захиргаа, Fintech" oninput="updateFieldSilently('category', this.value)"></div>
                <div class="form-group"><label>Хариуцах хэлтэс</label><input type="text" class="edit-input" value="${node.dept || ''}" oninput="updateFieldSilently('dept', this.value)"></div>
            </div>
            <div class="section-box">
                <label style="font-size:11px; font-weight:700; color:var(--primary-soft); text-transform:uppercase;">Үндсэн урсгалууд (${(node.children || []).length})</label>
                <div class="task-list-scroll">
                    ${(node.children || []).map((child, i) => `
                        <div class="task-row">
                            <input type="text" class="edit-input" value="${child.text}" oninput="updateChildData(${child.id}, this.value)">
                            <button class="btn-danger-text" onclick="deleteChildItemConfirm(${child.id}, '${child.text.replace(/'/g, "\\'")}')">Устгах</button>
                        </div>
                    `).join('')}
                </div>
                <button class="btn btn-primary btn-sm" style="width:100%; margin-top:10px;" onclick="addFirstLevelStep()">+ Үндсэн урсгал үүсгэх</button>
            </div>
            <button class="btn btn-danger-text" style="width:100%; margin-top:10px; border: 1px solid var(--error);" onclick="deleteSystemNodeConfirm(${node.id}, '${node.name.replace(/'/g, "\\'")}')">Энэ хуудсыг бүрмөсөн устгах</button>
        `;
        content.innerHTML = html;
    }

    function addChildToStep() { 
        if(selectedStepGlobal) { 
            pushToUndoHistory(); 
            const now = getFormattedTimestamp();
            if(!selectedStepGlobal.children) selectedStepGlobal.children = []; 
            selectedStepGlobal.children.push({ 
                id: Date.now(), 
                text: "Шинэ дэд алхам", 
                status: "ok", 
                duration: "20ms", 
                time: "11:33", 
                created_at: now, 
                detected_at: null, 
                checked_at: now, 
                comment: "", 
                checklist: [], 
                children: [] 
            }); 
            expandedSteps[selectedStepGlobal.id] = true; 
            save();
            openStepEditor(selectedStepGlobal); 
        } 
    }

    function addFirstLevelStep() { 
        const node = nodes.find(n => n.id === currentSystemId); 
        if(node) { 
            pushToUndoHistory(); 
            const now = getFormattedTimestamp();
            if(!node.children) node.children = []; 
            node.children.push({ 
                id: Date.now(), 
                text: "Шинэ урсгал", 
                status: "ok", 
                duration: "30ms", 
                time: "11:33", 
                created_at: now, 
                detected_at: null, 
                checked_at: now, 
                comment: "", 
                checklist: [], 
                children: [] 
            }); 
            save(); 
            openProgramEditor(node); 
        } 
    }
    
    function updateChildData(id, val) { 
        const node = nodes.find(n => n.id === currentSystemId);
        if(!node) return;
        const allSteps = flattenSteps(node.children);
        const target = allSteps.find(c => c.id === id);
        if(target) { 
            target.text = val; 
            localStorage.setItem(STORAGE_KEY, JSON.stringify(nodes));
            renderMainCanvasOnly(); 
        }
    }
    
    function deleteChildItemConfirm(id, name) {
        const node = nodes.find(n => n.id === currentSystemId);
        if(!node) return;
        
        let foundParentList = null;
        if(node.children.some(c => c.id === id)) { foundParentList = node; } 
        else {
            const allSteps = flattenSteps(node.children);
            const stepParent = allSteps.find(s => s.children && s.children.some(c => c.id === id));
            if(stepParent) foundParentList = stepParent;
        }

        if(foundParentList) {
            if(confirm(`"${name}" алхмыг устгах уу?`)) {
                pushToUndoHistory();
                foundParentList.children = foundParentList.children.filter(c => c.id !== id);
                save();
                if (selectedStepGlobal) openStepEditor(selectedStepGlobal);
                else openProgramEditor(node);
            }
        }
    }

    function deleteStepConfirm(id, name) {
        if(confirm(`"${name}" алхмыг устгах уу?`)) {
            pushToUndoHistory();
            deleteStepFromTree(nodes, id);
            closePanel();
            save();
        }
    }

    function deleteSystemNodeConfirm(id, name) {
        if(confirm(`"${name}" системийг устгавал доторх бүх урсгал устахыг анхаарна уу!`)) {
            pushToUndoHistory();
            nodes = nodes.filter(n => n.id !== id);
            currentSystemId = nodes.length > 0 ? nodes[0].id : null;
            closePanel();
            save();
        }
    }

    function deleteStepFromTree(items, id) { for(let i=0; i<items.length; i++) { if(items[i].id === id) { items.splice(i, 1); return true; } if(items[i].children && deleteStepFromTree(items[i].children, id)) return true; } return false; }

    function startDrag(e, node) {
        if(e.target.closest('.step-block')) return;
        const div = e.currentTarget; let startX = e.clientX, startY = e.clientY;
        const onMove = (ev) => {
            if (Math.abs(ev.clientX - startX) > 3 || Math.abs(ev.clientY - startY) > 3) { 
                viewport.style.transition = 'none'; 
                div.dataset.dragged = "true"; 
                node.x += ev.movementX / zoom; 
                node.y += ev.movementY / zoom; 
                renderMainCanvasOnly(); 
            }
        };
        const onUp = () => {
            window.removeEventListener('mousemove', onMove);
            if (div.dataset.dragged === "true") {
                save(); // Зөөж дуусахад координат хадгална
            }
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp, { once: true });
    }

    function addNewNode() { 
        pushToUndoHistory(); 
        const newId = Date.now();
        const n = { id: newId, name: "Шинэ Систем", x: 50, y: 150, dept: "Хэлтэс", category: selectedCategory || "Ерөнхий", isOpen: true, children: [] }; 
        nodes.push(n); 
        currentSystemId = newId;
        selectedNodeGlobal = n; 
        selectedStepGlobal = null; 
        save();
        openProgramEditor(n); 
    }
    
    function closePanel() { panel.classList.remove('open'); selectedStepGlobal = null; selectedNodeGlobal = null; renderMainCanvasOnly(); }
    function clearData() { if(confirm("Бүх хуудас, системүүд устах тул зөвшөөрөх үү?")) { localStorage.clear(); location.reload(); } }

    // Хамгийн анхны рендерийг Firebase onValue өөрөө удирдана
</script>
</body>
</html>
